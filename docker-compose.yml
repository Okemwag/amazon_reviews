services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: amazon_reviews_namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=amazon-reviews-cluster
    env_file:
      - ./configs/hadoop.env
    volumes:
      - namenode:/hadoop/dfs/name
      - ./configs:/workspace/configs
      - ./data:/workspace/data
      - ./hive:/workspace/hive
      - ./output:/workspace/output
      - ./src:/workspace/src

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: amazon_reviews_datanode
    restart: unless-stopped
    depends_on:
      - namenode
    env_file:
      - ./configs/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    volumes:
      - datanode:/hadoop/dfs/data

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: amazon_reviews_resourcemanager
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    ports:
      - "8088:8088"
    env_file:
      - ./configs/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: amazon_reviews_nodemanager
    restart: unless-stopped
    depends_on:
      - resourcemanager
    env_file:
      - ./configs/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: amazon_reviews_historyserver
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    ports:
      - "8188:8188"
    env_file:
      - ./configs/hadoop.env
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    volumes:
      - historyserver:/hadoop/yarn/timeline

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: amazon_reviews_hive_postgres
    restart: unless-stopped
    volumes:
      - hive-metastore-db:/var/lib/postgresql/data

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: amazon_reviews_hive_metastore
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
      - hive-metastore-postgresql
    env_file:
      - ./configs/hadoop.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 hive-metastore-postgresql:5432"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-postgresql/metastore"
      HIVE_CORE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
    ports:
      - "9083:9083"
    volumes:
      - ./configs:/workspace/configs
      - ./data:/workspace/data
      - ./hive:/workspace/hive
      - ./output:/workspace/output
      - ./src:/workspace/src
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: amazon_reviews_hive_server
    restart: unless-stopped
    depends_on:
      - hive-metastore
    env_file:
      - ./configs/hadoop.env
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-postgresql/metastore"
      HIVE_CORE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./configs:/workspace/configs
      - ./data:/workspace/data
      - ./hive:/workspace/hive
      - ./output:/workspace/output
      - ./src:/workspace/src
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro

  spark-master:
    build:
      context: ./docker/spark
    image: amazon-reviews-spark:3.5.3
    container_name: amazon_reviews_spark_master
    hostname: spark-master
    restart: unless-stopped
    depends_on:
      - namenode
      - hive-metastore
    environment:
      SPARK_LOCAL_HOSTNAME: spark-master
      SPARK_LOCAL_IP: 0.0.0.0
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./configs:/workspace/configs
      - ./data:/workspace/data
      - ./hive:/workspace/hive
      - ./output:/workspace/output
      - ./src:/workspace/src
      - ./configs/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./hive/hive-site.xml:/opt/spark/conf/hive-site.xml:ro

  spark-worker:
    build:
      context: ./docker/spark
    image: amazon-reviews-spark:3.5.3
    container_name: amazon_reviews_spark_worker
    hostname: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_LOCAL_HOSTNAME: spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2G
      - --webui-port
      - "8081"
    volumes:
      - ./configs:/workspace/configs
      - ./data:/workspace/data
      - ./hive:/workspace/hive
      - ./output:/workspace/output
      - ./src:/workspace/src
      - ./configs/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./hive/hive-site.xml:/opt/spark/conf/hive-site.xml:ro

volumes:
  namenode:
  datanode:
  historyserver:
  hive-metastore-db:
